[git_status]
format = '([$ahead_behind ]($style))([$index_added$index_modified$index_deleted](bold green))([$worktree_added$worktree_modified$worktree_deleted](bold red))([$untracked](bold yellow))[$stashed](bold sapphire)[$conflicted](bold maroon)'
style = "bold mauve"
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
stashed = "Ôëí"
untracked = "?"
conflicted = "="
index_added = "+${count}"
index_modified = "~${count}"
index_deleted = "Ô£İ${count}"
worktree_added = "+${count}"
worktree_modified = "~${count}"
worktree_deleted = "Ô£İ${count}"

[character]
success_symbol = "[ÔØ»](bold green)"
error_symbol = "[ÔØ»](bold red)"
vimcmd_symbol = "[ÔØ«](bold green)"

[cmd_duration]
min_time = 2_000
style = "yellow"
show_milliseconds = false

