# Worktrunk user configuration
# Managed by chezmoi — edit the source, not ~/.config/worktrunk/config.toml

[list]
# `summary` requires `full` (or the `--full` flag) to render — see worktrunk
# list docs. Defaulting to full ensures plain `wt list` shows the LLM summary,
# CI status, and main…± diffstat without needing `wt list --full` every time.
full = true
summary = true

[switch.picker]
pager = "delta --paging=never"

[pre-start]
copy = "wt step copy-ignored"

[post-start]
install-deps = """
echo '[install-deps] detecting package manager…'
if [ -f bun.lock ]; then
  if command -v bun >/dev/null 2>&1; then
    echo '[install-deps] detected bun → installing'
    bun install
  else
    echo "[worktrunk] bun.lock detected but bun is not installed; skipping deps install" >&2
  fi
elif [ -f pnpm-lock.yaml ]; then
  if command -v pnpm >/dev/null 2>&1; then
    echo '[install-deps] detected pnpm → installing'
    pnpm install
  else
    echo "[worktrunk] pnpm-lock.yaml detected but pnpm is not installed; skipping deps install" >&2
  fi
elif [ -f package-lock.json ]; then
  if command -v npm >/dev/null 2>&1; then
    echo '[install-deps] detected npm → installing'
    npm install
  else
    echo "[worktrunk] package-lock.json detected but npm is not installed; skipping deps install" >&2
  fi
else
  echo '[install-deps] no recognised lockfile, skipping'
fi
echo '[install-deps] done'
"""

[step.copy-ignored]
# Skip regenerable directories: [post-start].deps reinstalls packages, rebuilds regenerate
# framework/bundler/test caches, and venvs bake in absolute paths that break after copy.
# Keep `.idea/` (JetBrains project state) and `ios/Pods/` (CocoaPods is slow to reinstall).
exclude = [
    "node_modules/",
    ".next/",
    ".nx/",
    ".turbo/",
    ".expo/",
    ".cache/",
    ".parcel-cache/",
    ".vite/",
    ".swc/",
    "dist/",
    "build/",
    "out/",
    "storybook-static/",
    "coverage/",
    ".nyc_output/",
    "htmlcov/",
    "playwright-report/",
    "test-results/",
    ".stryker-tmp/",
    "__pycache__/",
    ".pytest_cache/",
    ".mypy_cache/",
    ".ruff_cache/",
    ".venv/",
    "venv/",
]

[commit.generation]
command = "MAX_THINKING_TOKENS=0 claude -p --model=haiku --tools='' --disable-slash-commands --setting-sources='' --system-prompt=''"

template = """
Write a commit message in Conventional Commits (commitizen) format.

RULES:
- First line: type(optional-scope): description (max 72 chars total)
- Valid types: feat, fix, docs, style, refactor, perf, test, build, chore, ci, revert
- Leave one blank line after the subject
- Body lines must NOT exceed 100 characters — hard wrap at 100
- Body should explain WHAT changed and WHY, not HOW
- Do NOT use markdown, bullet points, or lists in the body
- Output ONLY the raw commit message, nothing else
- Do NOT wrap the output in backticks, code fences, or any formatting

DIFF STAT:
{{ git_diff_stat }}

DIFF:
{{ git_diff }}
"""

squash-template = """
Write a single squash commit message in Conventional Commits (commitizen) format.

RULES:
- First line: type(optional-scope): description (max 72 chars total)
- Valid types: feat, fix, docs, style, refactor, perf, test, build, chore, ci, revert
- Leave one blank line after the subject
- Body lines must NOT exceed 100 characters — hard wrap at 100
- Body should summarize ALL the squashed commits into a coherent message
- Explain WHAT changed and WHY, not HOW
- Do NOT use markdown, bullet points, or lists in the body
- Output ONLY the raw commit message, nothing else
- Do NOT wrap the output in backticks, code fences, or any formatting

BRANCH: {{ branch }}
TARGET: {{ target_branch }}

SQUASHED COMMITS:
{{ commits }}

DIFF STAT:
{{ git_diff_stat }}
"""

[aliases]
# Tail the log file of a hook by id. Usage: wt wtlog user:post-start:install-deps
# Resolves the path via `wt config state logs --format=json` + jq, matching
# `<source>:<hook_type>:<name>` against each hook_output entry. {{ args[0] }} is
# already shell-escaped by worktrunk so it must NOT be wrapped in extra quotes.
wtlog = '''tail -f "$(wt config state logs --format=json | jq -r --arg id {{ args[0] }} '.hook_output[] | select((.source + ":" + .hook_type + ":" + .name) == $id) | .path' | head -1)"'''

# Quick CI + branches snapshot.
wtci = "wt list --full --branches"

# wt merge with a one-shot WORKTRUNK_COMMIT__GENERATION__COMMAND override that
# opens $EDITOR (fallback: vi) so the user handwrites the squash message instead
# of calling Claude haiku. Diff arrives on stdin and is included as commented-out
# context in the editor buffer; lines starting with `#` are stripped on output.
mc = '''WORKTRUNK_COMMIT__GENERATION__COMMAND='f=$(mktemp); printf "\n\n" > "$f"; sed "s/^/# /" >> "$f"; ${EDITOR:-vi} "$f" < /dev/tty > /dev/tty; grep -v "^#" "$f"' wt merge'''

[projects]
