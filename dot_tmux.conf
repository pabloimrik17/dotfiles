# Mouse support (click to select pane, resize, scroll)
set -g mouse on

# Fix terminal compatibility with Ghostty
set -g default-terminal "xterm-256color"

# Forward focus events to applications (enables vim autoread, shell integration)
set -g focus-events on

# Catppuccin theme — Mocha flavor with rounded window status
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Status line: application + session on the right, empty left
set -g status-right-length 100
set -g status-left ""
set -gF status-right "#{E:@catppuccin_status_application}#{E:@catppuccin_status_session}"

# Load Catppuccin plugin (graceful — no error if not yet installed)
run -b "[ -f ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux ] && ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux"
