# gh-dash configuration — Catppuccin Mocha themed
# https://github.com/dlvhdr/gh-dash

prSections:
    - title: My Pull Requests
      filters: is:open author:@me
    - title: Needs My Review
      filters: is:open review-requested:@me
    - title: Involved
      filters: is:open involves:@me -author:@me

issueSections:
    - title: My Issues
      filters: is:open author:@me
    - title: Assigned
      filters: is:open assignee:@me
    - title: Involved
      filters: is:open involves:@me -author:@me

notificationSections:
    - title: All
      filters: ""
    - title: Review Requested
      filters: reason:review-requested
    - title: Participating
      filters: reason:participating
    - title: Mentions
      filters: reason:mention

theme:
    ui:
        sectionsShowCount: true
        table:
            showSeparator: true
    colors:
        text:
            primary: "#cdd6f4"
            secondary: "#89b4fa"
            inverted: "#11111b"
            faint: "#bac2de"
            warning: "#f9e2af"
            success: "#a6e3a1"
            error: "#f38ba8"
        background:
            selected: "#313244"
        border:
            primary: "#89b4fa"
            secondary: "#45475a"
            faint: "#313244"

defaults:
    view: prs
    prsLimit: 20
    issuesLimit: 20
    notificationsLimit: 20
    preview:
        open: true
        width: 0.45
    refetchIntervalMinutes: 30

confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true

keybindings:
    universal:
        - key: L
          name: Lazygit
          command: cd {{.RepoPath}} && lazygit
    prs:
        # Direct execution (suspends TUI)
        - key: b
          name: Code review with Claude
          command: wt -C {{.RepoPath}} switch pr:{{.PrNumber}} -x "claude /code-review:code-review {{.RepoName}}#{{.PrNumber}}"
        - key: i
          name: Worktree + Claude
          command: wt -C {{.RepoPath}} switch pr:{{.PrNumber}} -x claude
        - key: t
          name: CI checks (inline)
          command: ENHANCE_THEME=catppuccin_mocha gh enhance -R {{.RepoName}} {{.PrNumber}}
        # Tmux variants (opens in split pane)
        - key: B
          name: Code review (tmux)
          command: tmux split-window -h 'wt -C {{.RepoPath}} switch pr:{{.PrNumber}} -x "claude /code-review:code-review {{.RepoName}}#{{.PrNumber}}"'
        - key: I
          name: Worktree + Claude (tmux)
          command: tmux split-window -h 'wt -C {{.RepoPath}} switch pr:{{.PrNumber}} -x claude'
        - key: T
          name: CI checks (tmux)
          command: tmux split-window -h 'ENHANCE_THEME=catppuccin_mocha gh enhance -R {{.RepoName}} {{.PrNumber}}'
        # AoE queue bindings: create the worktree via worktrunk and register it as
        # an Agent of Empires session WITHOUT launching (fill the fleet, open later).
        # `aoe add` returns immediately, so there's no interactive tmux variant.
        # Titles use a deterministic repo#pr token (not {{.Title}}): gh-dash renders
        # the template before the shell runs, so a PR title with a ' could break out
        # of the single-quoted -x payload and inject commands.
        - key: f
          name: Queue in AoE
          command: wt -C {{.RepoPath}} switch pr:{{.PrNumber}} -x 'aoe add . -t "pr {{.RepoName}}#{{.PrNumber}}"'
        - key: F
          name: Queue AoE review team
          # Folded block scalar: the review prompt contains ": " and nested quotes
          # that would break a plain YAML scalar; ">-" keeps them literal, one line.
          command: >-
              wt -C {{.RepoPath}} switch pr:{{.PrNumber}} -x 'aoe add . -t "review {{.RepoName}}#{{.PrNumber}}" -g "reviews/{{.RepoName}}" --extra-args' -- "Spin up a team of three agents to review this PR in parallel. None of them may post anything on the PR; every agent reports its findings back to me here. Agent 1: run /code-review:code-review. Agent 2: run /code-review. Agent 3: run /verify to confirm the changes actually work. When all three finish, consolidate everything into one summary here."

pager:
    diff: delta

repoPaths:
    ":owner/:repo": ~/WebstormProjects/:repo
