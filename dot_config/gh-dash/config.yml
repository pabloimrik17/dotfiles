# gh-dash configuration — Catppuccin Mocha themed
# https://github.com/dlvhdr/gh-dash

prSections:
    - title: My Pull Requests
      filters: is:open author:@me
    - title: Needs My Review
      filters: is:open review-requested:@me
    - title: Involved
      filters: is:open involves:@me -author:@me

issueSections:
    - title: My Issues
      filters: is:open author:@me
    - title: Assigned
      filters: is:open assignee:@me
    - title: Involved
      filters: is:open involves:@me -author:@me

notificationSections:
    - title: All
      filters: ""
    - title: Review Requested
      filters: reason:review-requested
    - title: Participating
      filters: reason:participating
    - title: Mentions
      filters: reason:mention

theme:
    ui:
        sectionsShowCount: true
        table:
            showSeparator: true
    colors:
        text:
            primary: "#cdd6f4"
            secondary: "#89b4fa"
            inverted: "#11111b"
            faint: "#bac2de"
            warning: "#f9e2af"
            success: "#a6e3a1"
            error: "#f38ba8"
        background:
            selected: "#313244"
        border:
            primary: "#89b4fa"
            secondary: "#45475a"
            faint: "#313244"

defaults:
    view: prs
    prsLimit: 20
    issuesLimit: 20
    notificationsLimit: 20
    preview:
        open: true
        width: 0.45
    refetchIntervalMinutes: 30

confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true

keybindings:
    universal:
        - key: L
          name: Lazygit
          command: cd {{.RepoPath}} && lazygit
    prs:
        # Direct execution (suspends TUI)
        - key: b
          name: Code review with Claude
          command: wt -C {{.RepoPath}} switch pr:{{.PrNumber}} -x "claude /code-review:code-review {{.RepoName}}#{{.PrNumber}}"
        - key: i
          name: Worktree + Claude
          command: wt -C {{.RepoPath}} switch pr:{{.PrNumber}} -x claude
        - key: t
          name: CI checks (inline)
          command: ENHANCE_THEME=catppuccin_mocha gh enhance -R {{.RepoName}} {{.PrNumber}}
        # Tmux variants (opens in split pane)
        - key: B
          name: Code review (tmux)
          command: tmux split-window -h 'wt -C {{.RepoPath}} switch pr:{{.PrNumber}} -x "claude /code-review:code-review {{.RepoName}}#{{.PrNumber}}"'
        - key: I
          name: Worktree + Claude (tmux)
          command: tmux split-window -h 'wt -C {{.RepoPath}} switch pr:{{.PrNumber}} -x claude'
        - key: T
          name: CI checks (tmux)
          command: tmux split-window -h 'ENHANCE_THEME=catppuccin_mocha gh enhance -R {{.RepoName}} {{.PrNumber}}'

pager:
    diff: delta

repoPaths:
    ":owner/:repo": ~/WebstormProjects/:repo
