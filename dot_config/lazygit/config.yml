# lazygit — Catppuccin Mocha (Blue) theme
# https://github.com/catppuccin/lazygit

gui:
    # Branch-level icons (incl. open-PR indicator added in lazygit 0.61).
    # Defaults are showIcons=false / nerdFontsVersion="" → no PR icon next
    # to branches even when `gh` already maps them. Both flags required.
    showIcons: true
    nerdFontsVersion: "3"
    theme:
        activeBorderColor:
            - "#89b4fa"
            - bold
        inactiveBorderColor:
            - "#a6adc8"
        searchingActiveBorderColor:
            - "#f9e2af"
        optionsTextColor:
            - "#89b4fa"
        selectedLineBgColor:
            - "#313244"
        inactiveViewSelectedLineBgColor:
            - "#6c7086"
        cherryPickedCommitFgColor:
            - "#89b4fa"
        cherryPickedCommitBgColor:
            - "#45475a"
        markedBaseCommitFgColor:
            - "#89b4fa"
        markedBaseCommitBgColor:
            - "#f9e2af"
        unstagedChangesColor:
            - "#f38ba8"
        defaultFgColor:
            - "#cdd6f4"
    authorColors:
        "*": "#b4befe"

# Open the selected file rendered via the mdview dispatcher (glow / mdfried).
# `output: terminal` hands the terminal to the viewer and resumes lazygit on exit
# (the modern, non-deprecated form of `subprocess: true` — using the deprecated
# key makes lazygit migrate + rewrite this whole file, which drifts from chezmoi).
# This views a whole document; diffs remain delta's job (unchanged).
customCommands:
    - key: "g"
      context: "files"
      command: "mdview {{.SelectedFile.Name | quote}}"
      output: terminal
      description: "Open file rendered (mdview: glow/mdfried)"
