[metadata]
name = "markdown"
description = "Browse Markdown files; preview rendered with glow, open via mdview"
requirements = ["fd", "glow"]

[source]
command = "fd -e md -e markdown --type f"

[preview]
# CLICOLOR_FORCE + an explicit style: the preview pane has no TTY, so `-s auto`
# falls back to glow's colorless "notty" profile and renders raw-looking. Forcing
# color + the dark style gives a real rendered preview.
command = "CLICOLOR_FORCE=1 glow -s dark '{}'"

[ui]
preview_panel = { size = 60 }

[keybindings]
enter = "actions:open"

[actions.open]
description = "Open in mdview (glow / mdfried)"
command = "mdview '{}'"
mode = "execute"
