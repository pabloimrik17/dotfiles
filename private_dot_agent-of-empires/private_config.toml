# Agent of Empires — chezmoi-managed global config (~/.agent-of-empires/config.toml).
#
# AoE persists runtime state (e.g. [app_state]) into this same file. Expect
# `chezmoi diff` to show AoE-added keys after first launch; either accept them
# or run `chezmoi apply` to revert.
#
# A `modify_` merge script (to preserve AoE's runtime writeback) was evaluated
# but deferred: no TOML-merge tool is on PATH (dasel/yq absent, system python is
# 3.9 without tomllib/tomli_w) and policy forbids a new brew dep just for this.
# Stance: static file + accept the diff thrash (improve-aoe-config D3 fallback).

[theme]
name = "catppuccin-mocha"
color_mode = "truecolor"

[session]
default_tool = "claude"
agent_status_hooks = true

[worktree]
init_submodules = false

[tmux]
status_bar = "disabled"
# "enabled" runs `set-clipboard on` + `allow-passthrough on` on aoe sessions so
# OSC 52 writes from wrapped agents reach the terminal. Default "auto" is a no-op
# when a user ~/.tmux.conf exists. ghostty clipboard-read = ask is untouched.
clipboard = "enabled"
# Pin mouse mode: the user owns `mouse on` in ~/.tmux.conf; "disabled" keeps aoe
# from touching it (determinism), mirroring status_bar = "disabled".
mouse = "disabled"

[updates]
update_check_mode = "off"

# State-transition audio for parallel-session awareness. Assets installed by
# `aoe sounds install` live in ~/.agent-of-empires/sounds (not committable; see
# .chezmoiignore). TRIAL — keep or prune after soak.
[sound]
enabled = true

[status_hooks]
enabled = true
on_waiting = 'terminal-notifier -title "aoe: $AOE_SESSION_TITLE" -message "needs input" -sound Glass'
on_idle = 'terminal-notifier -title "aoe: $AOE_SESSION_TITLE" -message "done"'
on_error = 'terminal-notifier -title "aoe: $AOE_SESSION_TITLE" -message "errored" -sound Basso'

# Sandboxed sessions only — passed into the Docker container. Non-sandboxed
# sessions inherit the parent shell env directly.
[sandbox]
environment = ["CLAUDE_CONFIG_DIR", "EDITOR", "TERM", "COLORTERM"]

# In-AoE git UI scoped to the session worktree, bound to Alt+g (free in ghostty
# and tmux; confirm against the AoE built-in overlay). Subtable header kept last
# so it doesn't capture trailing top-level keys. TRIAL — keep or prune after soak.
[tools.lazygit]
command = "lazygit"
hotkey = "Alt+g"
